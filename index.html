<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f5efe6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="我们的" />
  <meta name="description" content="纪念我们在一起的每一天" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet" />

  <title>我们的</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5efe6;
      --bg2:      #ede4d6;
      --rose:     #b5404e;
      --rose-lt:  #c96070;
      --rose-dim: #c8a090;
      --gold:     #9a7a50;
      --text:     #3a2820;
      --muted:    #9a8070;
      --border:   rgba(181,64,78,0.18);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif SC', serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Canvas bg ── */
    #canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Main layout ── */
    .page {
      position: relative;
      z-index: 1;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 20px) 32px env(safe-area-inset-bottom, 20px);
      gap: 0;
    }

    /* ── Ornament top ── */
    .ornament {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--rose-dim));
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeIn 1.2s 0.2s forwards;
    }

    /* ── Heart ── */
    .heart-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeIn 1s 0.4s forwards;
    }

    .heart-container svg {
      width: 100%;
      height: 100%;
      /* 柔和呼吸，去掉弹跳感 */
      animation: breathe 5s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1);    opacity: 1; }
      50%       { transform: scale(1.04); opacity: 0.92; }
    }

    /* ── Days ── */
    .days-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(80px, 22vw, 130px);
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: -3px;
      color: var(--text);
      opacity: 0;
      animation: riseIn 1s 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .days-unit {
      font-size: 13px;
      letter-spacing: 0.4em;
      color: var(--muted);
      margin-top: 14px;
      margin-bottom: 44px;
      opacity: 0;
      animation: fadeIn 1s 0.8s forwards;
    }

    /* ── Divider ── */
    .divider {
      width: 48px;
      height: 1px;
      background: var(--border);
      margin-bottom: 44px;
      opacity: 0;
      animation: fadeIn 1s 0.9s forwards;
    }

    /* ── Stats row ── */
    .stats {
      display: flex;
      gap: 0;
      opacity: 0;
      animation: fadeIn 1s 1s forwards;
      margin-bottom: 48px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 28px;
    }

    .stat + .stat {
      border-left: 1px solid var(--border);
    }

    .stat-n {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      color: var(--text);
      line-height: 1;
    }

    .stat-l {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Since label ── */
    .since {
      font-size: 11px;
      letter-spacing: 0.25em;
      color: var(--muted);
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeIn 1s 1.1s forwards;
    }

    /* ── Milestones ── */
    .milestones {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 320px;
      opacity: 0;
      animation: fadeIn 1s 1.2s forwards;
    }

    .ms {
      font-size: 11px;
      letter-spacing: 0.15em;
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid rgba(138,101,112,0.3);
      color: var(--muted);
      background: transparent;
      transition: all 0.3s;
    }

    .ms.reached {
      border-color: var(--rose-dim);
      color: var(--rose-lt);
      background: rgba(200,84,106,0.06);
    }

    .ms.next {
      border-color: var(--rose);
      color: var(--rose-lt);
      background: rgba(200,84,106,0.1);
    }

    /* ── Bottom ornament ── */
    .ornament-bottom {
      width: 1px;
      height: 60px;
      background: linear-gradient(to top, transparent, var(--rose-dim));
      margin-top: 32px;
      opacity: 0;
      animation: fadeIn 1.2s 1.3s forwards;
    }

    /* ── Animations ── */
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="page">
  <div class="ornament"></div>

  <div class="heart-container">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="hg" x1="30%" y1="10%" x2="70%" y2="100%">
          <stop offset="0%"   stop-color="#f0e0d0" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#7a2030" stop-opacity="0.07"/>
        </linearGradient>
        <clipPath id="hc">
          <path d="M50,81 C27,66 10,48 10,30 C10,18 19,11 29,12.5
                   C36.5,13.5 43,19.5 50,27.5
                   C57,19.5 63.5,13.5 71,12.5
                   C81,11 90,18 90,30 C90,48 73,66 50,81Z"/>
        </clipPath>
      </defs>

      <!-- outer double dashed ring -->
      <circle cx="50" cy="50" r="46"   fill="none" stroke="#c8a870" stroke-width="0.45" stroke-dasharray="1.6 4"   opacity="0.52"/>
      <circle cx="50" cy="50" r="43.5" fill="none" stroke="#c8a870" stroke-width="0.2"  stroke-dasharray="0.4 2.5" opacity="0.28"/>

      <!-- cardinal ornament dots -->
      <circle cx="50"   cy="3.5"  r="0.9" fill="#c8a870" opacity="0.45"/>
      <circle cx="50"   cy="96.5" r="0.9" fill="#c8a870" opacity="0.45"/>
      <circle cx="3.5"  cy="50"   r="0.9" fill="#c8a870" opacity="0.45"/>
      <circle cx="96.5" cy="50"   r="0.9" fill="#c8a870" opacity="0.45"/>

      <!-- ghost fill -->
      <path d="M50,81 C27,66 10,48 10,30 C10,18 19,11 29,12.5
               C36.5,13.5 43,19.5 50,27.5
               C57,19.5 63.5,13.5 71,12.5
               C81,11 90,18 90,30 C90,48 73,66 50,81Z"
            fill="url(#hg)"/>

      <!-- vintage engraving hatch lines (clipped to heart) -->
      <g clip-path="url(#hc)" opacity="0.11">
        <line x1="-10" y1="60"  x2="60"  y2="-10" stroke="#6a3020" stroke-width="0.55"/>
        <line x1="-10" y1="70"  x2="70"  y2="-10" stroke="#6a3020" stroke-width="0.55"/>
        <line x1="-10" y1="80"  x2="80"  y2="-10" stroke="#6a3020" stroke-width="0.55"/>
        <line x1="-10" y1="90"  x2="90"  y2="-10" stroke="#6a3020" stroke-width="0.55"/>
        <line x1="-10" y1="100" x2="100" y2="-10" stroke="#6a3020" stroke-width="0.55"/>
        <line x1="0"   y1="110" x2="110" y2="0"   stroke="#6a3020" stroke-width="0.55"/>
        <line x1="10"  y1="110" x2="110" y2="10"  stroke="#6a3020" stroke-width="0.55"/>
        <line x1="20"  y1="110" x2="110" y2="20"  stroke="#6a3020" stroke-width="0.55"/>
        <line x1="30"  y1="110" x2="110" y2="30"  stroke="#6a3020" stroke-width="0.55"/>
        <line x1="40"  y1="110" x2="110" y2="40"  stroke="#6a3020" stroke-width="0.55"/>
        <line x1="50"  y1="110" x2="110" y2="50"  stroke="#6a3020" stroke-width="0.55"/>
      </g>

      <!-- main heart outline -->
      <path d="M50,81 C27,66 10,48 10,30 C10,18 19,11 29,12.5
               C36.5,13.5 43,19.5 50,27.5
               C57,19.5 63.5,13.5 71,12.5
               C81,11 90,18 90,30 C90,48 73,66 50,81Z"
            fill="none" stroke="#8a4050" stroke-width="0.82" opacity="0.88"/>

      <!-- inner echo 1 -->
      <path d="M50,73 C31,59 20,46 20,32 C20,24 26,18.5 33,19.5
               C39,20.5 44,25.5 50,32.5
               C56,25.5 61,20.5 67,19.5
               C74,18.5 80,24 80,32 C80,46 69,59 50,73Z"
            fill="none" stroke="#b07878" stroke-width="0.38" opacity="0.58"/>

      <!-- inner echo 2 -->
      <path d="M50,65 C36,54 27,44 27,34 C27,28 32,24 37.5,25
               C42,26 46,30 50,36
               C54,30 58,26 62.5,25
               C68,24 73,28 73,34 C73,44 64,54 50,65Z"
            fill="none" stroke="#c0a070" stroke-width="0.26" opacity="0.42"/>

      <!-- inner echo 3 -->
      <path d="M50,57 C41,49 34,42 34,35.5 C34,31.5 37,29 40.5,29.5
               C44,30 47,33.5 50,38.5
               C53,33.5 56,30 59.5,29.5
               C63,29 66,31.5 66,35.5 C66,42 59,49 50,57Z"
            fill="none" stroke="#c0a070" stroke-width="0.18" opacity="0.28"/>

      <!-- ── top dip scrollwork ── -->
      <path d="M50,22 L52,26.5 L50,31 L48,26.5Z"
            fill="none" stroke="#8a4050" stroke-width="0.55" opacity="0.62"/>
      <path d="M48.5,26.5 Q43,21.5 37.5,23.5 Q34.5,25.5 36,28.5"
            fill="none" stroke="#b07878" stroke-width="0.42" opacity="0.52"/>
      <path d="M36,28.5 Q35,31 37.5,31.5"
            fill="none" stroke="#b07878" stroke-width="0.3"  opacity="0.36"/>
      <path d="M51.5,26.5 Q57,21.5 62.5,23.5 Q65.5,25.5 64,28.5"
            fill="none" stroke="#b07878" stroke-width="0.42" opacity="0.52"/>
      <path d="M64,28.5 Q65,31 62.5,31.5"
            fill="none" stroke="#b07878" stroke-width="0.3"  opacity="0.36"/>

      <!-- ── bottom tip ornament ── -->
      <path d="M50,85.5 L53,81 L50,76.5 L47,81Z"
            fill="none" stroke="#8a4050" stroke-width="0.58" opacity="0.65"/>
      <line x1="50"   y1="85.5" x2="50"   y2="88.5" stroke="#b07878" stroke-width="0.38" opacity="0.45"/>
      <line x1="48.5" y1="88.5" x2="51.5" y2="88.5" stroke="#b07878" stroke-width="0.38" opacity="0.4"/>

      <!-- ── lobe cross ornaments ── -->
      <line x1="22" y1="19" x2="22" y2="25" stroke="#c0a070" stroke-width="0.38" opacity="0.42"/>
      <line x1="19" y1="22" x2="25" y2="22" stroke="#c0a070" stroke-width="0.38" opacity="0.42"/>
      <line x1="78" y1="19" x2="78" y2="25" stroke="#c0a070" stroke-width="0.38" opacity="0.42"/>
      <line x1="75" y1="22" x2="81" y2="22" stroke="#c0a070" stroke-width="0.38" opacity="0.42"/>
    </svg>
  </div>

  <div class="days-num" id="days">0</div>
  <div class="days-unit">天 &nbsp;·&nbsp; DAYS TOGETHER</div>

  <div class="divider"></div>

  <div class="stats">
    <div class="stat">
      <span class="stat-n" id="weeks">0</span>
      <span class="stat-l">周</span>
    </div>
    <div class="stat">
      <span class="stat-n" id="months">0</span>
      <span class="stat-l">月</span>
    </div>
    <div class="stat">
      <span class="stat-n" id="hours">0</span>
      <span class="stat-l">小时</span>
    </div>
  </div>

  <div class="since">自 2025 年 2 月 21 日</div>

  <div class="milestones" id="milestones"></div>

  <div class="ornament-bottom"></div>
</div>


<script>
// ── Petal canvas ──
(function () {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // 绘制单片花瓣（菱形旋转）
  function drawPetal(ctx, x, y, w, h, angle, alpha, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    // 四点花瓣形
    ctx.moveTo(0, -h / 2);
    ctx.bezierCurveTo( w/2, -h/4,  w/2,  h/4, 0,  h/2);
    ctx.bezierCurveTo(-w/2,  h/4, -w/2, -h/4, 0, -h/2);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
  }

  const COLORS = ['#d4537e', '#c96070', '#e8a0b0', '#b5404e', '#e8b4a8'];

  class Petal {
    constructor(initial) { this.reset(initial); }
    reset(initial) {
      this.x     = Math.random() * W;
      this.y     = initial ? Math.random() * H : -20;
      this.w     = 6 + Math.random() * 8;
      this.h     = this.w * (1.4 + Math.random() * 0.4);
      this.angle = Math.random() * Math.PI * 2;
      this.spin  = (Math.random() - 0.5) * 0.025;
      this.vy    = 0.4 + Math.random() * 0.6;
      this.vx    = (Math.random() - 0.5) * 0.5;
      this.sway  = Math.random() * Math.PI * 2;
      this.swaySpeed = 0.012 + Math.random() * 0.012;
      this.swayAmp   = 0.4 + Math.random() * 0.5;
      this.maxAlpha  = 0.12 + Math.random() * 0.14;
      this.alpha     = initial ? this.maxAlpha * Math.random() : 0;
      this.color     = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.life      = initial ? Math.random() * 300 : 0;
      this.maxLife   = 300 + Math.random() * 200;
    }
    update() {
      this.life++;
      const t = this.life / this.maxLife;
      this.alpha = t < 0.12 ? (t / 0.12) * this.maxAlpha
                 : t > 0.85 ? ((1 - t) / 0.15) * this.maxAlpha
                 : this.maxAlpha;
      this.sway += this.swaySpeed;
      this.x += this.vx + Math.sin(this.sway) * this.swayAmp;
      this.y += this.vy;
      this.angle += this.spin;
      if (this.life >= this.maxLife || this.y > H + 30) this.reset(false);
    }
    draw() {
      drawPetal(ctx, this.x, this.y, this.w, this.h, this.angle, this.alpha, this.color);
    }
  }

  const petals = [];
  for (let i = 0; i < 22; i++) petals.push(new Petal(true));

  function loop() {
    ctx.clearRect(0, 0, W, H);
    petals.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }
  loop();
})();

// ── Anniversary logic ──
(function () {
  const START = new Date('2025-02-21T00:00:00');

  const MILESTONES = [
    { days: 100,  label: '100天' },
    { days: 200,  label: '200天' },
    { days: 365,  label: '一周年' },
    { days: 500,  label: '500天' },
    { days: 730,  label: '两周年' },
    { days: 1000, label: '1000天' },
  ];

  function update() {
    const now  = new Date();
    const diff = now - START;
    const days  = Math.floor(diff / 86400000);
    const hours = Math.floor(diff / 3600000);
    const weeks  = Math.floor(days / 7);
    const months = Math.floor(days / 30.4375);

    document.getElementById('days').textContent   = days.toLocaleString('zh-CN');
    document.getElementById('hours').textContent  = hours.toLocaleString('zh-CN');
    document.getElementById('weeks').textContent  = weeks;
    document.getElementById('months').textContent = months;

    const el = document.getElementById('milestones');
    el.innerHTML = '';
    let nextDone = false;
    MILESTONES.forEach(m => {
      const tag = document.createElement('div');
      if (days >= m.days) {
        tag.className = 'ms reached';
        tag.textContent = '✓ ' + m.label;
      } else if (!nextDone) {
        nextDone = true;
        tag.className = 'ms next';
        tag.textContent = m.label + ' · 还差 ' + (m.days - days) + ' 天';
      } else {
        tag.className = 'ms';
        tag.textContent = m.label;
      }
      el.appendChild(tag);
    });
  }

  update();
  setInterval(update, 60000);
})();


// ── Service Worker ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
